id = "yayamlls"
name = "yayamlls"
description = "YAML language server in Go: schema-driven diagnostics, completion, hover, and Flux rendering."
version = "0.1.0"
schema_version = 1
authors = ["home-operations"]
repository = "https://github.com/home-operations/yayamlls"

# Registers yayamlls as a language server for Zed's built-in YAML language.
# Zed ships its own yaml-language-server; to make yayamlls the only one, add to
# your settings.json:
#   "languages": { "YAML": { "language_servers": ["yayamlls", "!yaml-language-server"] } }
[language_servers.yayamlls]
name = "yayamlls"
languages = ["YAML"]

# Required so the extension may fetch release binaries from GitHub.
[[capabilities]]
kind = "download_file"
host = "github.com"
path = ["home-operations", "yayamlls", "**"]
